stages:
  - compatibility

default:
  image: rust:1-bookworm

variables:
  DEBIAN_FRONTEND: noninteractive
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/.cargo-target"
  SCCACHE_DIR: "$CI_PROJECT_DIR/.sccache"
  SCCACHE_CACHE_SIZE: "2G"
  RUSTC_WRAPPER: sccache
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  NODE_VERSION: "22.15.0"

cache:
  key:
    files:
      - package-lock.json
      - .gitlab-ci.yml
  paths:
    - node_modules/
    - .node/
    - .sccache/
    - .cargo/registry/
    - .cargo/git/
    - .cargo-target/

linux-compatibility:
  stage: compatibility
  before_script:
    - export PATH="$CI_PROJECT_DIR/.node/bin:$PATH"
    - |
      missing=()
      command -v curl >/dev/null || missing+=("curl")
      command -v git >/dev/null || missing+=("git")
      command -v xz >/dev/null || missing+=("xz-utils")
      command -v pkg-config >/dev/null || missing+=("pkg-config")
      test -f /usr/include/sys/capability.h || missing+=("libcap-dev")
      if [ "${#missing[@]}" -gt 0 ]; then
        apt-get update -y
        apt-get install -y --no-install-recommends "${missing[@]}"
      fi
    - |
      if [ ! -x "$CI_PROJECT_DIR/.node/bin/node" ]; then
        mkdir -p "$CI_PROJECT_DIR/.node"
        curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o /tmp/node.tar.xz
        tar -xJf /tmp/node.tar.xz --strip-components=1 -C "$CI_PROJECT_DIR/.node"
      fi
    - |
      if ! command -v sccache >/dev/null; then
        cargo install sccache --locked
      fi
    - npm ci
  script:
    - chmod +x ./scripts/gitlab-linux-compat.sh
    - ./scripts/gitlab-linux-compat.sh
