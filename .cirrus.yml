task:
  name: linux-compatibility
  container:
    image: ubuntu:24.04

  node_modules_cache:
    folder: node_modules
    fingerprint_script: cat package-lock.json

  cargo_registry_cache:
    folder: /root/.cargo/registry
    fingerprint_script: echo cargo-registry-v1

  cargo_git_cache:
    folder: /root/.cargo/git
    fingerprint_script: echo cargo-git-v1

  install_script:
    - apt-get update -y
    - apt-get install -y curl ca-certificates git build-essential pkg-config libcap-dev
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable

  dependencies_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - npm ci

  compatibility_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - chmod +x ./scripts/cirrus-linux-compat.sh
    - ./scripts/cirrus-linux-compat.sh
