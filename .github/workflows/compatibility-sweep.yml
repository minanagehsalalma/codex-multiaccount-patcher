name: compatibility-sweep

on:
  workflow_dispatch:
    inputs:
      versions:
        description: Optional comma-separated versions or tags to test
        required: false
      count:
        description: Number of recent stable versions to test when versions is empty
        required: false
        default: "5"
      min_version:
        description: Optional minimum stable version to include
        required: false
        default: "0.119.0"
      target_set:
        description: fast=Linux only, full=Linux+Windows
        required: false
        default: "fast"
  schedule:
    - cron: "43 3 * * *"

permissions:
  contents: read

concurrency:
  group: compatibility-sweep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: resolve
        shell: bash
        run: |
          args=()
          if [ -n "${{ github.event.inputs.versions }}" ]; then
            args+=(--versions "${{ github.event.inputs.versions }}")
          else
            args+=(--count "${{ github.event.inputs.count || '5' }}")
            if [ -n "${{ github.event.inputs.min_version || '0.119.0' }}" ]; then
              args+=(--min-version "${{ github.event.inputs.min_version || '0.119.0' }}")
            fi
          fi
          args+=(--target-set "${{ github.event.inputs.target_set || 'fast' }}")
          MATRIX="$(node ./scripts/resolve-version-matrix.mjs "${args[@]}")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  sweep:
    needs: resolve-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/checkout@v6
        with:
          repository: openai/codex
          ref: ${{ matrix.codex_ref }}
          path: upstream
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sweep-${{ matrix.platform }}-${{ matrix.codex_version }}
          cache-on-failure: "true"
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-dev pkg-config
      - name: Apply maintained patch program
        shell: bash
        run: |
          mkdir -p dist/debug
          node ./scripts/apply-maintained-patch.mjs --upstream-root ./upstream --json > "dist/debug/patch-report-${{ matrix.codex_version }}-${{ matrix.artifact_suffix }}.json"
      - name: Run focused regressions
        shell: bash
        working-directory: upstream/codex-rs
        run: |
          export CODEX_TEST_CODEX_HOME_ROOT="$PWD/.codex-test-home"
          mkdir -p "$CODEX_TEST_CODEX_HOME_ROOT"
          cargo test -p codex-core --lib client::tests::current_client_setup_reloads_auth_from_disk_between_turns -- --exact
          cargo test -p codex-core --test all suite::client_websockets::responses_websocket_reconnects_when_auth_snapshot_changes_between_turns -- --exact
      - name: Check patched Codex CLI
        shell: bash
        working-directory: upstream/codex-rs
        run: cargo check -p codex-cli --release --locked
      - name: Upload compatibility debug bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compatibility-${{ matrix.codex_version }}-${{ matrix.artifact_suffix }}
          path: |
            dist/debug/*
            upstream/codex-rs/core/src/client.rs
            upstream/codex-rs/core/src/client_tests.rs
            upstream/codex-rs/core/tests/common/responses.rs
            upstream/codex-rs/core/tests/suite/client_websockets.rs

